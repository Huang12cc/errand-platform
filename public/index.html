<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理端 - 跑腿平台</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
<div class="login-card">
  <h2>⚙️ 管理后台</h2>
  <p class="sub">跑腿接单平台 · 数据管理</p>
  <div class="form-group">
    <label>用户名</label>
    <input id="loginUser" placeholder="请输入管理员账号">
  </div>
  <div class="form-group">
    <label>密码</label>
    <input id="loginPass" type="password" placeholder="请输入密码">
  </div>
  <button class="btn btn-primary btn-block" onclick="doLogin()">登 录</button>
</div>

<script>
const API = '';
async function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value.trim();
  if (!u || !p) return alert('请填写完整');
  try {
    const res = await fetch(API + '/api/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ username: u, password: p, role: 'admin' })
    });
    const data = await res.json();
    if (!res.ok) return alert(data.error);
    localStorage.setItem('errand_user', JSON.stringify(data.user));
    localStorage.setItem('errand_token', data.token);
    window.location.href = 'admin.html';
  } catch(e) { alert('网络错误'); }
}
</script>
</body>
</html>
