<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#4a6cf7">
<title>跑腿接单</title>
<link rel="manifest" href="/manifest.json">
<style>
:root{--p:#4a6cf7;--s:#10b981;--d:#ef4444;--w:#f59e0b;--bg:#f2f3f7;--c:#fff;--t:#1e293b;--t2:#94a3b8;--b:#e2e8f0}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--t);-webkit-tap-highlight-color:transparent}
#app{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;position:relative;overflow-x:hidden}

/* 顶部栏 */
.header{position:sticky;top:0;z-index:50;background:var(--c);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--b);padding-top:max(12px,env(safe-area-inset-top))}
.header h1{font-size:17px;font-weight:700}
.header .user{font-size:13px;color:var(--t2)}

/* 页面 */
.page{display:none;padding:16px;padding-bottom:100px}
.page.active{display:block}

/* 登录页 */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#667eea,#764ba2);padding:24px}
.login-card{width:100%;background:#fff;border-radius:20px;padding:32px 24px;box-shadow:0 10px 40px rgba(0,0,0,.15)}
.login-card .logo{text-align:center;font-size:56px;margin-bottom:4px}
.login-card .appname{text-align:center;font-size:22px;font-weight:800;color:var(--t)}
.login-card .sub{text-align:center;font-size:13px;color:var(--t2);margin-bottom:24px}
.tabs{display:flex;border:1px solid var(--b);border-radius:10px;overflow:hidden;margin-bottom:20px}
.tab{flex:1;text-align:center;padding:10px;font-size:14px;background:#f8fafc;border:none;cursor:pointer;font-family:inherit}
.tab.active{background:var(--p);color:#fff;font-weight:600}
.input-group{margin-bottom:14px}
.input-group label{display:block;font-size:12px;color:var(--t2);margin-bottom:4px;font-weight:500}
.input-group input,.input-group select{width:100%;padding:11px 14px;border:1px solid var(--b);border-radius:10px;font-size:15px;background:#fafbfc;font-family:inherit;-webkit-appearance:none}
.btn{display:block;width:100%;padding:13px;border-radius:10px;border:none;font-size:16px;font-weight:600;cursor:pointer;text-align:center;font-family:inherit;transition:.15s}
.btn:active{opacity:.8}
.btn-p{background:var(--p);color:#fff}
.btn-s{background:var(--s);color:#fff}
.btn-d{background:var(--d);color:#fff}
.btn-o{background:#fff;color:var(--p);border:1px solid var(--p)}

/* 卡片 */
.card{background:var(--c);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card-title{font-size:16px;font-weight:700;margin-bottom:12px}
.card-title2{font-size:14px;font-weight:600;margin-bottom:8px;color:var(--t2)}

/* 任务项 */
.task-item{display:flex;justify-content:space-between;align-items:center;padding:14px 12px;background:#fafbfc;border-radius:10px;margin-bottom:8px}
.task-left{flex:1;min-width:0}
.task-title{font-size:15px;font-weight:600}
.task-meta{font-size:12px;color:var(--t2);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
.task-right{flex-shrink:0;margin-left:10px}
.task-right .btn{width:auto;padding:8px 14px;font-size:13px;border-radius:8px}

/* 徽章 */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.b-pending{background:#fef3c7;color:#92400e}
.b-accepted{background:#dbeafe;color:#1e40af}
.b-completed{background:#d1fae5;color:#065f46}
.b-cancelled{background:#fee2e2;color:#991b1b}

/* 付款状态 */
.pay-pending{color:#ef4444;font-weight:600}
.pay-waiting{color:#f59e0b;font-weight:600}
.pay-confirmed{color:#10b981;font-weight:600}

/* 余额卡 */
.balance-card{display:flex;align-items:center;justify-content:space-between;padding:16px;background:linear-gradient(135deg,#10b981,#059669);border-radius:14px;color:#fff;margin-bottom:12px}
.balance-amount{font-size:32px;font-weight:800}
.balance-label{font-size:12px;opacity:.9}
.balance-card .btn{background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.3);width:auto;padding:8px 16px;font-size:13px}

/* 底部导航 */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--c);border-top:1px solid var(--b);display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:50}
.tabbar-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0;font-size:11px;color:var(--t2);border:none;background:none;cursor:pointer;font-family:inherit}
.tabbar-item.active{color:var(--p)}
.tabbar-item .icon{font-size:22px;margin-bottom:2px}

/* 提示卡片 */
.tip-card{background:#fff8e1;border:1px solid #fcd34d;border-radius:12px;padding:14px;margin-bottom:12px}
.tip-card .wechat-id{font-size:20px;font-weight:800;color:var(--p);margin:8px 0;user-select:text;-webkit-user-select:text}

/* 空状态 */
.empty{text-align:center;padding:40px 0;color:var(--t2)}
.empty .icon{font-size:48px;margin-bottom:8px}

/* 模态层 */
.modal-mask{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal-sheet{width:100%;max-width:480px;background:#fff;border-radius:16px 16px 0 0;padding:20px;animation:slideUp .25s}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* Toast */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;color:#fff;font-size:14px;z-index:200;background:var(--t);animation:fadeIn .25s}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.toast.s{background:var(--s)}
.toast.e{background:var(--d)}

/* iOS safe area */
@supports(padding:max(0px)){.header{padding-top:max(12px,env(safe-area-inset-top))}}
</style>
</head>
<body>
<div id="app">
  <!-- ====== 登录页 ====== -->
  <div class="page active" id="page-login">
    <div class="login-wrap">
      <div class="login-card">
        <div class="logo">🏃</div>
        <div class="appname">跑腿接单</div>
        <div class="sub">发布任务 · 接单赚钱</div>
        <div class="tabs">
          <button class="tab active" onclick="switchLoginTab('login')">登录</button>
          <button class="tab" onclick="switchLoginTab('reg')">注册</button>
        </div>
        <div id="loginForm">
          <div class="input-group"><label>角色</label><select id="loginRole"><option value="user">用户端（发布任务）</option><option value="runner">跑腿端（接单）</option></select></div>
          <div class="input-group"><label>用户名</label><input id="loginUser" placeholder="请输入用户名"></div>
          <div class="input-group"><label>密码</label><input id="loginPass" type="password" placeholder="请输入密码"></div>
          <button class="btn btn-p" onclick="doLogin()">登 录</button>
        </div>
        <div id="regForm" style="display:none">
          <div class="input-group"><label>注册为</label><select id="regRole"><option value="user">用户端</option><option value="runner">跑腿端</option></select></div>
          <div class="input-group"><label>用户名</label><input id="regUser" placeholder="请输入用户名"></div>
          <div class="input-group"><label>密码</label><input id="regPass" type="password" placeholder="请输入密码"></div>
          <div class="input-group"><label>手机号（选填）</label><input id="regPhone" placeholder="请输入手机号"></div>
          <button class="btn btn-s" onclick="doRegister()">注 册</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ====== 用户端主页 ====== -->
  <div class="page" id="page-user-home">
    <div class="header"><h1>📦 用户端</h1><span class="user" id="userName1"></span></div>
    <div id="unpaidTip"></div>
    <div class="card"><div class="card-title" onclick="showPublish()">📝 发布新任务 →</div></div>
    <div class="card">
      <div class="card-title">📋 我的任务</div>
      <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap" id="filterBtns"></div>
      <div id="myTasksList"><div class="empty"><div class="icon">📭</div>暂无任务</div></div>
    </div>
  </div>

  <!-- ====== 用户端发布 ====== -->
  <div class="page" id="page-user-publish">
    <div class="header"><h1 onclick="showPage('user-home')">← 发布任务</h1></div>
    <div class="card">
      <div class="input-group"><label>任务标题 *</label><input id="pubTitle" placeholder="例如：帮我取快递"></div>
      <div class="input-group"><label>报酬（元）*</label><input id="pubReward" type="number" placeholder="例如：10" step="0.01"></div>
      <div class="input-group"><label>描述</label><textarea id="pubDesc" placeholder="任务详情..." style="width:100%;padding:11px 14px;border:1px solid var(--b);border-radius:10px;font-size:15px;background:#fafbfc;font-family:inherit;min-height:80px;resize:vertical"></textarea></div>
      <div class="input-group"><label>地址</label><input id="pubAddr" placeholder="例如：3号教学楼"></div>
      <button class="btn btn-p" onclick="publishTask()">📤 发布任务</button>
    </div>
  </div>

  <!-- ====== 跑腿端主页 ====== -->
  <div class="page" id="page-runner-home">
    <div class="header"><h1>🏃 跑腿端</h1><span class="user" id="runnerName"></span></div>
    <div class="balance-card">
      <div><div class="balance-label">💰 我的余额</div><div class="balance-amount" id="balanceDisplay">¥0.00</div></div>
      <button class="btn" onclick="requestWithdraw()">申请提现</button>
    </div>
    <div class="card">
      <div class="card-title">📋 任务广场</div>
      <div id="taskPool"><div class="empty"><div class="icon">📭</div>暂无可接任务</div></div>
    </div>
    <div class="card">
      <div class="card-title">📌 我的接单</div>
      <div id="myAccepted"><div class="empty"><div class="icon">📭</div>暂无进行中的任务</div></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast" style="display:none"></div>

<script>
const API = '';
let currentUser = null;
let currentFilter = '';

// ===== 导航 =====
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
}

function switchLoginTab(t) {
  document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('active', (t==='login'?0:1)===i));
  document.getElementById('loginForm').style.display = t==='login'?'':'none';
  document.getElementById('regForm').style.display = t==='reg'?'':'none';
}

// ===== Toast =====
function toast(msg, type) {
  const t = document.getElementById('toast'); t.textContent = msg; t.className = 'toast ' + (type||'');
  t.style.display = ''; setTimeout(() => t.style.display = 'none', 2000);
}

// ===== API =====
async function api(method, path, data) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (data) opts.body = JSON.stringify(data);
  const res = await fetch(API + path, opts);
  const json = await res.json();
  if (!res.ok) throw json;
  return json;
}

// ===== 登录/注册 =====
async function doLogin() {
  const role = document.getElementById('loginRole').value;
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value.trim();
  if (!username || !password) return toast('请填写完整', 'e');
  try {
    const r = await api('POST', '/api/login', { username, password, role });
    currentUser = r.user;
    localStorage.setItem('app_user', JSON.stringify(r.user));
    if (r.user.role === 'user') { showPage('user-home'); loadUserData(); }
    else { showPage('runner-home'); loadRunnerData(); }
  } catch(e) { toast(e.error || '登录失败', 'e'); }
}

async function doRegister() {
  const role = document.getElementById('regRole').value;
  const username = document.getElementById('regUser').value.trim();
  const password = document.getElementById('regPass').value.trim();
  const phone = document.getElementById('regPhone').value.trim();
  if (!username || !password) return toast('请填写完整', 'e');
  if (password.length < 3) return toast('密码至少3位', 'e');
  try {
    await api('POST', '/api/register', { username, password, role, phone });
    toast('注册成功，请登录', 's');
    switchLoginTab('login');
    document.getElementById('loginUser').value = username;
    document.getElementById('loginRole').value = role;
  } catch(e) { toast(e.error || '注册失败', 'e'); }
}

// ===== 用户端 =====
async function loadUserData() {
  document.getElementById('userName1').textContent = currentUser.username;
  try {
    const params = { client_id: currentUser.id };
    if (currentFilter) params.status = currentFilter;
    const qs = Object.entries(params).filter(([,v]) => v).map(([k,v]) => k+'='+encodeURIComponent(v)).join('&');
    const tasks = await api('GET', '/api/tasks?' + qs);
    
    // 付款指引
    const unpaid = tasks.filter(t => t.status === 'pending' && t.paid === 0);
    document.getElementById('unpaidTip').innerHTML = unpaid.length > 0 ? 
      `<div class="tip-card">
        <div style="font-weight:700;color:#92400e;">💡 你有 ${unpaid.length} 个待付款任务</div>
        <div style="margin-top:4px;font-size:13px;color:#92400e;">请添加微信转账：</div>
        <div class="wechat-id" onclick="navigator.clipboard.writeText('Huang12-c');toast('已复制微信号','s')">📋 Huang12-c</div>
        <div style="font-size:12px;color:#b45309;">转账后点击任务下方的「我已付款」</div>
      </div>` : '';

    // 筛选按钮
    const filters = ['', 'pending', 'accepted', 'completed'];
    const names = ['全部', '待接单', '进行中', '已完成'];
    document.getElementById('filterBtns').innerHTML = filters.map((f,i) =>
      `<button class="btn btn-o" style="width:auto;padding:6px 12px;font-size:12px;${currentFilter===f?'background:var(--p);color:#fff;border-color:var(--p)':''}" onclick="currentFilter='${f}';loadUserData()">${names[i]}</button>`
    ).join('');

    // 任务列表
    const list = document.getElementById('myTasksList');
    if (tasks.length === 0) {
      list.innerHTML = '<div class="empty"><div class="icon">📭</div>暂无任务</div>';
    } else {
      list.innerHTML = tasks.map(t => `
        <div class="task-item">
          <div class="task-left">
            <div class="task-title">${esc(t.title)}</div>
            <div class="task-meta">
              <span>💰 ¥${t.reward}</span>
              ${t.status==='pending' ? `<span class="${t.paid===0?'pay-pending':t.paid===1?'pay-waiting':'pay-confirmed'}">${t.paid===0?'💳待付款':t.paid===1?'⏳待确认':'✅已确认'}</span>` : ''}
              <span class="badge ${t.status==='pending'?'b-pending':t.status==='accepted'?'b-accepted':t.status==='completed'?'b-completed':'b-cancelled'}">${{pending:'待接单',accepted:'进行中',completed:'已完成',cancelled:'已取消'}[t.status]}</span>
              ${t.runner_name ? '<span>🏃 '+esc(t.runner_name)+'</span>' : ''}
            </div>
          </div>
          <div class="task-right">
            ${t.status==='pending' && t.paid===0 ? `<button class="btn btn-s" onclick="markPaid(${t.id})">我已付款</button>` : ''}
            ${t.status==='accepted' ? `<button class="btn btn-s" onclick="completeMyTask(${t.id})">确认完成</button>` : ''}
            ${t.status==='pending' && t.paid!==2 ? `<button class="btn btn-d" style="margin-top:4px" onclick="cancelMyTask(${t.id})">取消</button>` : ''}
          </div>
        </div>`).join('');
    }
  } catch(e) { console.error(e); }
}

function showPublish() { showPage('user-publish'); }

async function publishTask() {
  const title = document.getElementById('pubTitle').value.trim();
  const reward = parseFloat(document.getElementById('pubReward').value);
  const description = document.getElementById('pubDesc').value.trim();
  const address = document.getElementById('pubAddr').value.trim();
  if (!title || !reward) return toast('请填写标题和报酬', 'e');
  try {
    await api('POST', '/api/tasks', { title, reward, description, address, client_id: currentUser.id });
    toast('发布成功！', 's');
    document.getElementById('pubTitle').value = '';
    document.getElementById('pubReward').value = '';
    document.getElementById('pubDesc').value = '';
    document.getElementById('pubAddr').value = '';
    showPage('user-home'); loadUserData();
  } catch(e) { toast(e.error || '失败', 'e'); }
}

async function markPaid(id) {
  if (!confirm('确认已向微信号 Huang12-c 转账？')) return;
  try { await api('POST', '/api/tasks/' + id + '/mark-paid'); toast('已标记', 's'); loadUserData(); }
  catch(e) { toast(e.error || '失败', 'e'); }
}

async function completeMyTask(id) {
  if (!confirm('确认任务已完成？')) return;
  try { await api('POST', '/api/tasks/' + id + '/complete'); toast('已完成', 's'); loadUserData(); }
  catch(e) { toast(e.error || '失败', 'e'); }
}

async function cancelMyTask(id) {
  if (!confirm('确认取消？')) return;
  try { await api('POST', '/api/tasks/' + id + '/cancel'); toast('已取消'); loadUserData(); }
  catch(e) { toast(e.error || '失败', 'e'); }
}

// ===== 跑腿端 =====
async function loadRunnerData() {
  document.getElementById('runnerName').textContent = currentUser.username;
  document.getElementById('balanceDisplay').textContent = '¥' + (currentUser.balance || 0).toFixed(2);
  try {
    const [pool, myTasks] = await Promise.all([
      api('GET', '/api/tasks?status=pending&paid=2'),
      api('GET', '/api/tasks?runner_id=' + currentUser.id)
    ]);
    // 任务广场
    const p = document.getElementById('taskPool');
    p.innerHTML = pool.length === 0 ? '<div class="empty"><div class="icon">📭</div>暂无可接任务</div>' :
      pool.map(t => `<div class="task-item">
        <div class="task-left"><div class="task-title">${esc(t.title)}</div>
          <div class="task-meta"><span>💰 ¥${t.reward}</span><span>📍 ${esc(t.address||'未指定')}</span><span>👤 ${esc(t.client_name)}</span></div></div>
        <div class="task-right"><button class="btn btn-p" onclick="acceptTask(${t.id})">接单</button></div>
      </div>`).join('');
    // 我的接单
    const a = document.getElementById('myAccepted');
    const active = myTasks.filter(t => t.status === 'accepted');
    const done = myTasks.filter(t => t.status === 'completed');
    let h = '';
    if (active.length) h += '<div class="card-title2">进行中</div>' + active.map(t => `<div class="task-item">
      <div class="task-left"><div class="task-title">${esc(t.title)}</div><div class="task-meta"><span>💰 ¥${t.reward}</span><span>👤 ${esc(t.client_name)}</span></div></div>
      <div class="task-right"><button class="btn btn-s" onclick="markTaskComplete(${t.id})">标记完成</button></div>
    </div>`).join('');
    if (done.length) h += '<div class="card-title2" style="margin-top:10px">已完成</div>' + done.slice(0,5).map(t => `<div class="task-item" style="opacity:.7">
      <div class="task-left"><div class="task-title">${esc(t.title)}</div><div class="task-meta"><span>💰 ¥${t.reward}</span><span class="badge b-completed">已完成</span></div></div>
    </div>`).join('');
    a.innerHTML = h || '<div class="empty"><div class="icon">📭</div>暂无任务</div>';
  } catch(e) { console.error(e); }
}

async function acceptTask(id) {
  if (!confirm('确认接单？')) return;
  try { await api('POST', '/api/tasks/' + id + '/accept', { runner_id: currentUser.id }); toast('接单成功', 's'); loadRunnerData(); }
  catch(e) { toast(e.error || '失败', 'e'); }
}

async function markTaskComplete(id) {
  if (!confirm('确认已完成？')) return;
  try { await api('POST', '/api/tasks/' + id + '/complete'); toast('报酬已到账 💰', 's');
    currentUser.balance = (currentUser.balance || 0) + (document.querySelector('#myAccepted .task-item .task-meta span') ? parseFloat(document.querySelector('#myAccepted .task-item .task-meta span').textContent.replace('💰 ¥','')) : 0);
    loadRunnerData();
  } catch(e) { toast(e.error || '失败', 'e'); }
}

async function requestWithdraw() {
  const bal = currentUser.balance || 0;
  if (bal <= 0) return toast('余额为0', 'e');
  if (!confirm('提现 ¥' + bal.toFixed(2) + ' 到微信？\n管理员将通过微信 Huang12-c 打款')) return;
  try { await api('POST', '/api/runner/withdraw', { runner_id: currentUser.id, amount: bal }); toast('提现申请已提交', 's'); currentUser.balance = 0; loadRunnerData(); }
  catch(e) { toast(e.error || '失败', 'e'); }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ===== 初始化 =====
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
const saved = localStorage.getItem('app_user');
if (saved) {
  currentUser = JSON.parse(saved);
  showPage(currentUser.role === 'user' ? 'user-home' : 'runner-home');
  if (currentUser.role === 'user') loadUserData(); else loadRunnerData();
}
</script>
</body>
</html>
